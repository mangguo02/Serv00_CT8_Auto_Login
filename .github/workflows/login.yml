name: Serv00 自动登录

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 */15 * *"  # 每十五天运行一次
  push:
    branches:
      - main

jobs:
  login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v6

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装 Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip xvfb libnss3 fonts-liberation
          python -m pip install --upgrade pip
          pip install selenium requests webdriver-manager chromedriver-binary-auto
      
      - name: 设置代理转发 (Gost)
        env:
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
        run: |
          if [ -n "$SOCKS5_PROXY" ]; then
            echo "检测到代理配置，启动 Gost 转发..."
            wget https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
            gzip -d gost-linux-amd64-2.11.5.gz
            chmod +x gost-linux-amd64-2.11.5
            ./gost-linux-amd64-2.11.5 -L=socks5://127.0.0.1:1080 -F=$SOCKS5_PROXY &
            sleep 3
            
            echo "--- 开始测试代理连通性 ---"
            curl --max-time 10 --socks5-hostname 127.0.0.1:1080 -I https://panel.ct8.pl || echo "❌ 代理测试失败！你的 SOCKS5 节点无法连接目标网站！"
            echo "--- 测试结束 ---"
          else
            echo "未设置 SOCKS5_PROXY，跳过代理转发"
          fi

      - name: 运行登录脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
        run: python login_script.py

      - name: 运行登录脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACCOUNTS_JSON: ${{ secrets.ACCOUNTS_JSON }}
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
        run: python login_script.py

      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: login-screenshots
          path: "*.png"
          retention-days: 7

  keepalive-workflow:
    name: Keepalive Workflow
    needs: login
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
